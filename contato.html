    <main>
        <section class="formulario">
            <h2>Fale comigo 🎸</h2>
            <form class="form-contato">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required />
                <div id="avisonome" class="aviso"></div>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required />
                <div id="avisoemail" class="aviso"></div>

                <label for="assunto">Assunto:</label>
                <input type="text" id="assunto" name="assunto" required />
                <div id="avisoassunto" class="aviso"></div>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
                <div id="avisomensagem" class="aviso"></div>

                <button id="bt" type="submit">Enviar</button>
                <p id="mensagem-sucesso" class="sucesso"></p>
            </form>
        </section>
    </main>
